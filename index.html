<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITO BURGER | Homemade Taste</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="designs.css">
</head>
<body>

    <section class="hero">
        <header>
            <div class="logo">BSCS-2A BURGER</div>
            <nav>
                <a href="#home">Home</a>
                <a href="#menu">Menu</a>
                <a href="#reservations">Reservations</a>
                <a href="#about">About Us</a>
                <span class="search-icon">🔍</span>
            </nav>
        </header>

        <div class="hero-content">
            <div class="hero-text">
                <span class="script-text">Tito's homemade taste</span>
                <h1 class="main-title">BURGER</h1>
                <p class="subtitle">Get your order without the lines or the wait.<br>Pick it up at the counter and enjoy!</p>
                <button class="cta-button">Order Now</button>
            </div>
            <div class="hero-image-container">
                <img src="pic1.png" alt="Huge Tito Burger" class="burger-image">
            </div>
        </div>
    </section>

    <section class="menu-section" id="menu">
        <h2>Weekly Menu</h2>
        <div class="placeholder-cards">
            <div class="card">Classic Burger</div>
            <div class="card">Cheese Overload</div>
            <div class="card">Bacon BBQ Special</div>
        </div>
    </section>

    <script src="designsss.js"></script>
</body>
</html>
